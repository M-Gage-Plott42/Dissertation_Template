name: Template CI

on:
  push:
  pull_request:
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  template-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install TeX and audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            biber \
            latexmk \
            poppler-utils \
            python3-pip \
            ripgrep \
            rsync \
            texlive-bibtex-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex
          python3 -m pip install --break-system-packages -r requirements-audits.txt

      - name: Prepare CI build copy
        run: |
          mkdir -p /tmp/template-ci
          rsync -a --delete --exclude='.git' ./ /tmp/template-ci/
          cd /tmp/template-ci

          # Ubuntu runners generally do not include Times New Roman;
          # use a metrically similar TeX font for compile-only CI checks.
          sed -i 's/\\setmainfont{Times New Roman}/\\setmainfont{TeX Gyre Termes}/' Dissertation_Main.tex

      - name: Build (draft mode) and scan log
        run: |
          cd /tmp/template-ci
          latexmk -C
          latexmk -pdfxe -bibtex Dissertation_Main.tex

          ! rg -n -F "LaTeX Error" Dissertation_Main.log
          ! rg -n -F "Undefined references" Dissertation_Main.log
          ! rg -n -F "Overfull \\\\hbox" Dissertation_Main.log
          ! rg -n -F "Underfull \\\\hbox" Dissertation_Main.log

      - name: Build (final mode) and audit rendered PDF
        run: |
          cd /tmp/template-ci
          rg -n "\\\\UTCFinalfalse" Dissertation_Main.tex
          sed -i 's/\\UTCFinalfalse/\\UTCFinaltrue/' Dissertation_Main.tex

          latexmk -C
          latexmk -pdfxe -bibtex Dissertation_Main.tex
          python3 scripts/check_dissertation_hyperlinks.py
          python3 scripts/check_dissertation_fonts.py \
            --policy refs/editorial_audit/dissertation_font_policy_ci.yml
          python3 scripts/check_dissertation_prelim_contract.py
          python3 scripts/check_dissertation_abstract_cap.py
          python3 scripts/check_dissertation_toc_contract.py
          python3 scripts/check_dissertation_page_geometry.py
          python3 scripts/check_dissertation_margin_structural.py
          python3 scripts/build_dissertation_margin_proof_overlay.py \
            --out dissertation_margin_proof_overlay_current.pdf
          test -s dissertation_margin_proof_overlay_current.pdf
