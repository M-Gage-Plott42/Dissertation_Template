{
  "purpose": "Run a separate non-baseline rendered exact-margin audit for the shipped UTC template families in inches only. This stays out of default public-template CI and serves as a second-phase exactness surface once the generic compliance baseline is already green.",
  "heading_top_checks": [
    {
      "name": "committee page title family",
      "required_patterns": [
        "^TITLE OF THESIS OR DISSERTATION IN ALL CAPS",
        "\\(Chair\\)",
        "Professor of \\[Department\\]"
      ],
      "phrase": "TITLE OF THESIS OR DISSERTATION IN ALL CAPS",
      "top_range_in": [
        2.00,
        2.04
      ]
    },
    {
      "name": "title page title family",
      "required_patterns": [
        "^TITLE OF THESIS OR DISSERTATION IN ALL CAPS",
        "Degree Name",
        "Month Year"
