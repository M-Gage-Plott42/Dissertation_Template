      "top_range_in": [
        2.00,
        2.04
      ]
    },
    {
      "name": "abstract opener family",
      "required_patterns": [
        "^ABSTRACT",
        "maximum word count"
      ],
      "phrase": "ABSTRACT",
      "top_range_in": [
        1.99,
        2.02
      ]
    },
