  "gap_checks": [
    {
      "name": "title page title-to-By gap",
      "required_patterns": [
        "^TITLE OF THESIS OR DISSERTATION IN ALL CAPS",
        "Degree Name",
        "Month Year"
      ],
      "upper_phrase": "TITLE OF THESIS OR DISSERTATION IN ALL CAPS",
